<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #FFC0CB;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* ENVELOPE */
.envelope-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  cursor: pointer;
}

.envelope {
  width: 260px;
  height: 170px;
  background: #ff9eb5;
  position: relative;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.envelope-flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #D02E77;
  clip-path: polygon(0 0,50% 60%,100% 0);
  transform-origin: top;
  transition: transform 1s cubic-bezier(0.65,0,0.35,1);
}

.open .envelope-flap {
  transform: rotateX(-160deg);
}

.heart {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.tap-text {
  margin-top: 20px;
  color: #D02E77;
}

/* CONTENT */
.content {
  display: none;
  padding: 20px;
}

/* STICKY NOTES */
.board {
  margin: 30px auto;
  width: 90%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.note {
  background: #fff8a6;
  padding: 15px;
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  border-radius: 6px;
  transform: rotate(-2deg);
}
.note:nth-child(2){ transform: rotate(2deg); }
.note:nth-child(4){ transform: rotate(1deg); }

/* CENTER TEXT */
.center-text {
  text-align: center;
  font-size: 34px;
  color: #D02E77;
  margin: 40px 0;
}

/* CAROUSEL */
.carousel-container {
  overflow: hidden;
  margin: 20px 0;
}

.carousel-container.top {
  transform: rotate(-2deg);
}
.carousel-container.bottom {
  transform: rotate(2deg);
}

.carousel {
  display: flex;
  gap: 20px;
  width: max-content;
}

/* INFINITE LOOP */
.scroll-right {
  animation: scrollRight 40s linear infinite;
}
.scroll-left {
  animation: scrollLeft 40s linear infinite;
}

@keyframes scrollRight {
  from { transform: translateX(-50%); }
  to { transform: translateX(0); }
}

@keyframes scrollLeft {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.polaroid {
  background: white;
  padding: 10px 10px 30px;
  width: 220px;
  flex-shrink: 0;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.polaroid img,
.polaroid video {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  to { transform: translateY(110vh); }
}

/* PETALS (ORIGINAL STYLE) */
.petal {
  position: fixed;
  width: 10px;
  height: 6px;
  background: #ffb6c1;
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
  animation: float linear forwards;
}

@keyframes float {
  0% {
    transform: translateY(-10px) translateX(0) rotate(0deg);
  }
  100% {
    transform: translateY(110vh) translateX(40px) rotate(180deg);
  }
}
</style>
</head>

<body>

<audio id="music" src="blindspot.mp3" loop></audio>

<div class="envelope-screen" onclick="openSite()">
  <div class="envelope">
    <div class="envelope-flap"></div>
    <div class="heart">❤️</div>
  </div>
  <div class="tap-text">open for ur surprise</div>
</div>

<div class="content" id="content">

  <div class="board">
    <div class="note">I love you ❤️</div>
    <div class="note">1 year already 🫶</div>
    <div class="note">Still stuck with me 😌</div>
    <div class="note">My favourite human 💖</div>
    <div class="note">More memories to go ✨</div>
  </div>

  <div class="carousel-container top">
    <div class="carousel scroll-right" id="carouselTop"></div>
  </div>

  <div class="center-text">Happy 1 Year Bubzu ❤️</div>

  <div class="carousel-container bottom">
    <div class="carousel scroll-left" id="carouselBottom"></div>
  </div>

</div>

<script>

function openSite(){
  document.querySelector('.envelope').classList.add('open');
  document.getElementById("music").play().catch(()=>{});

  launchConfetti();
  setTimeout(startPetals, 1000);

  setTimeout(()=>{
    document.querySelector(".envelope-screen").style.display="none";
    document.getElementById("content").style.display="block";
  },800);
}

/* MEDIA */
const topCarousel = document.getElementById("carouselTop");
const bottomCarousel = document.getElementById("carouselBottom");

let items=[];

for(let i=0;i<16;i++){
  items.push(`<div class="polaroid"><img src="photos/${i}.JPG"></div>`);
  if(i<9){
    items.push(`<div class="polaroid"><video src="videos/${i}.MP4" autoplay muted loop playsinline></video></div>`);
  }
}

let content = items.join("") + items.join("");

topCarousel.innerHTML = content;
bottomCarousel.innerHTML = content;

/* CONFETTI */
function launchConfetti(){
  const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2"];
  for(let i=0;i<80;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* PETALS */
function createPetal(){
  let p=document.createElement("div");
  p.className="petal";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(Math.random()*6+6)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),12000);
}

function startPetals(){
  setInterval(createPetal,400);
}

</script>

</body>
</html>
