<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #FFC0CB;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* Envelope */
.envelope-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  perspective: 1000px;
}

.envelope {
  width: 300px;
  height: 200px;
  position: relative;
  cursor: pointer;
}

.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg,#ffb6c1,#ffc9d6);
  border-radius: 10px;
}

.envelope-flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #D02E77;
  clip-path: polygon(0 0,50% 60%,100% 0);
  transform-origin: top;
  transition: transform 1s cubic-bezier(.68,-0.55,.27,1.55);
}

.open .envelope-flap {
  transform: rotateX(-160deg);
}

.heart {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
}

/* CTA */
.tap-text {
  margin-top: 20px;
  font-size: 18px;
  color: #D02E77;
  animation: fadePulse 2s infinite;
}

@keyframes fadePulse {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Content */
.content {
  padding-bottom: 120px;
}

/* Title */
.title {
  text-align: center;
  font-size: 34px;
  color: #D02E77;
  opacity: 0;
}

.show-title {
  opacity: 1;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.08); }
}

/* Board */
.board {
  display: none;
  margin: 40px auto;
  width: 90%;
  max-width: 900px;
  background: #f5deb3;
  padding: 30px;
  border-radius: 12px;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  justify-items: center;
}

.note {
  background: #fff8a6;
  padding: 12px 16px;
  width: 140px;
  text-align: center;
  box-shadow: 3px 6px 12px rgba(0,0,0,0.2);
}

.note:nth-child(1){transform:rotate(-5deg);}
.note:nth-child(2){transform:rotate(4deg);}
.note:nth-child(3){transform:rotate(-3deg);}
.note:nth-child(4){transform:rotate(5deg);}
.note:nth-child(5){transform:rotate(-4deg);}

/* Carousel */
.carousel-wrapper {
  overflow: hidden;
  width: 100%;
  display: none;
}

.carousel {
  display: flex;
  gap: 30px;
  padding: 30px;
}

.polaroid {
  background: white;
  padding: 12px 12px 40px;
  width: 220px;
  flex-shrink: 0;
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}

.polaroid img,
.polaroid video {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<audio id="music" src="blindspot.mp3"></audio>

<div class="envelope-container">
  <div class="envelope" onclick="openEnvelope()">
    <div class="envelope-body"></div>
    <div class="envelope-flap"></div>
    <div class="heart">❤️</div>
  </div>
  <div class="tap-text">Tap to open your surprise ✨</div>
</div>

<div class="content">
  <div class="title" id="title">Happy 1 Year Bubzu</div>

  <div class="board" id="board">
    <div class="note">I love you ❤️</div>
    <div class="note">1 year of chaos 🫶</div>
    <div class="note">Still stuck with me 😌</div>
    <div class="note">My favourite human 💖</div>
    <div class="note">More memories to go ✨</div>
  </div>

  <div class="carousel-wrapper" id="carouselWrapper">
    <div class="carousel" id="carousel"></div>
  </div>
</div>

<script>

/* OPEN FLOW */
function openEnvelope(){
  const music = document.getElementById("music");

  music.volume = 0;
  music.play();

  let fade = setInterval(()=>{
    if(music.volume < 0.2){
      music.volume += 0.01;
    } else {
      clearInterval(fade);
    }
  },100);

  document.querySelector('.envelope').classList.add('open');
  launchConfetti();

  setTimeout(()=>{
    document.getElementById('title').classList.add('show-title');
  },500);

  setTimeout(()=>{
    document.getElementById('board').style.display='grid';
    document.getElementById('carouselWrapper').style.display='block';
    loadMedia();
    startScroll();

    document.querySelector('.content').scrollIntoView({behavior:'smooth'});
  },1500);
}

/* MEDIA (MATCHED TO YOUR FILES) */
function loadMedia(){
  const c=document.getElementById('carousel');
  let items=[];

  // 16 PHOTOS (0–15, .JPG)
  for(let i=0;i<16;i++){
    items.push(`<div class="polaroid">
      <img src="photos/${i}.JPG">
    </div>`);
  }

  // 9 VIDEOS (0–8, .MP4)
  for(let i=0;i<9;i++){
    items.push(`<div class="polaroid">
      <video src="videos/${i}.MP4" autoplay muted loop playsinline></video>
    </div>`);
  }

  c.innerHTML = items.join("") + items.join("");
}

/* SCROLL */
let scrollX=0, paused=false;
let speed=0.8;

function startScroll(){
  const c=document.getElementById('carousel');

  function animate(){
    if(!paused){
      scrollX -= speed;
      c.style.transform=`translateX(${scrollX}px)`;
      if(Math.abs(scrollX)>c.scrollWidth/2){scrollX=0;}
    }
    requestAnimationFrame(animate);
  }

  animate();
  c.addEventListener("mouseenter",()=>paused=true);
  c.addEventListener("mouseleave",()=>paused=false);
}

/* CANVAS */
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[], petals=[];

function launchConfetti(){
  const colors=["#ffffff","#ffd1dc","#ffe4e1","#ffb6c1","#fff0f5"];
  for(let i=0;i<90;i++){
    confetti.push({
      x:innerWidth/2,y:innerHeight/2,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      size:Math.random()*4+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:1
    });
  }
}

function createPetal(){
  petals.push({
    x:Math.random()*innerWidth,
    y:-10,
    size:Math.random()*8+6,
    speed:Math.random()*1+0.5,
    sway:Math.random()*2,
    rotation:Math.random()*Math.PI
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetti.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.08;
    p.alpha-=0.01;

    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);

    if(p.alpha<=0) confetti.splice(i,1);
  });

  ctx.globalAlpha=1;

  if(Math.random()<0.1) createPetal();

  petals.forEach((p,i)=>{
    p.y+=p.speed;
    p.x+=Math.sin(p.y*0.02)*p.sway;

    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rotation);

    ctx.fillStyle="#ffb6c1";
    ctx.beginPath();
    ctx.ellipse(0,0,p.size,p.size/2,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    if(p.y>innerHeight) petals.splice(i,1);
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
