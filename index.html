<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #FFC0CB;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ENVELOPE */
.envelope-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  cursor: pointer;
}

.envelope {
  width: 260px;
  height: 170px;
  background: #ff9eb5;
  position: relative;
  border-radius: 10px;
}

.envelope-flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #D02E77;
  clip-path: polygon(0 0,50% 60%,100% 0);
  transform-origin: top;
  transition: transform 1s ease;
}

.open .envelope-flap {
  transform: rotateX(-160deg);
}

.heart {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.tap-text {
  margin-top: 20px;
  color: #D02E77;
}

/* CONTENT */
.content {
  display: none;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 28px;
  color: #D02E77;
}

/* STICKY NOTES */
.board {
  margin: 30px auto;
  width: 90%;
  max-width: 800px;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.note {
  background: #fff8a6;
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

/* CAROUSEL */
.carousel-container {
  position: relative;
  overflow: hidden;
}

.carousel {
  display: flex;
  gap: 20px;
}

.polaroid {
  background: white;
  padding: 10px 10px 30px;
  width: 220px;
  flex-shrink: 0;
  border-radius: 10px;
}

.polaroid img,
.polaroid video {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* BUTTONS */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 20px;
  padding: 10px;
  cursor: pointer;
}

.left { left: 10px; }
.right { right: 10px; }

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<audio id="music" src="blindspot.mp3" loop></audio>

<div class="envelope-screen" onclick="openSite()">
  <div class="envelope">
    <div class="envelope-flap"></div>
    <div class="heart">❤️</div>
  </div>
  <div class="tap-text">open for ur surprise</div>
</div>

<div class="content" id="content">

  <div class="title">Happy 1 Year Bubzu ❤️</div>

  <div class="board">
    <div class="note">I love you ❤️</div>
    <div class="note">1 year already 🫶</div>
    <div class="note">Still stuck with me 😌</div>
    <div class="note">My favourite human 💖</div>
    <div class="note">More memories to go ✨</div>
  </div>

  <div class="carousel-container">
    <button class="nav left" onclick="scrollManual(1)">⬅️</button>
    <div class="carousel" id="carousel"></div>
    <button class="nav right" onclick="scrollManual(-1)">➡️</button>
  </div>

</div>

<script>

function openSite(){
  document.querySelector('.envelope').classList.add('open');
  document.getElementById("music").play().catch(()=>{});

  setTimeout(()=>{
    document.querySelector(".envelope-screen").style.display="none";
    document.getElementById("content").style.display="block";
  },800);

  launchConfetti();
}

/* MEDIA */
const carousel=document.getElementById("carousel");
let items=[];

for(let i=0;i<16;i++){
  items.push(`<div class="polaroid"><img src="photos/${i}.JPG"></div>`);
  if(i<9){
    items.push(`<div class="polaroid"><video src="videos/${i}.MP4" autoplay muted loop playsinline></video></div>`);
  }
}

carousel.innerHTML=items.join("")+items.join("");

/* SCROLL */
let scrollX=0, paused=false;

function animate(){
  if(!paused){
    scrollX-=0.7;
    carousel.style.transform=`translateX(${scrollX}px)`;
    if(Math.abs(scrollX)>carousel.scrollWidth/2) scrollX=0;
  }
  requestAnimationFrame(animate);
}
animate();

function scrollManual(dir){
  scrollX+=dir*250;
}

carousel.addEventListener("mouseenter",()=>paused=true);
carousel.addEventListener("mouseleave",()=>paused=false);

/* CONFETTI */
function launchConfetti(){
  const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2"];
  for(let i=0;i<80;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(Math.random()*2+3)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

</script>

</body>
</html>
