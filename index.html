<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #FFC0CB;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* QUESTION SCREENS */
.question-screen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:200;
}

.box {
  text-align:center;
  font-size:24px;
}

.box button {
  margin:10px;
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
}

/* NO SCREEN */
.no-screen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  z-index:300;
}

/* ENVELOPE */
.envelope-screen {
  display:none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  cursor: pointer;
}

.envelope {
  width: 260px;
  height: 170px;
  background: #ff9eb5;
  position: relative;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.envelope-flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #D02E77;
  clip-path: polygon(0 0,50% 60%,100% 0);
  transform-origin: top;
  transition: transform 1s cubic-bezier(0.65,0,0.35,1);
}

.open .envelope-flap {
  transform: rotateX(-160deg);
}

.heart {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.tap-text {
  margin-top: 20px;
  color: #D02E77;
}

/* INTRO SCREEN */
.intro-screen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 1s ease;
  z-index:100;
}

.intro-screen.show {
  opacity:1;
}

.intro-card {
  background:#FDF5E6;
  color:#D02E77;
  padding:30px 50px;
  font-size:28px;
  border-radius:10px;
  transform:scale(0.8);
  opacity:0;
  transition:all 0.8s ease;
}

.intro-screen.show .intro-card {
  transform:scale(1);
  opacity:1;
}

/* CONTENT */
.content {
  display: none;
  padding: 20px;
}

/* STICKY NOTES */
.board {
  margin: 30px auto;
  width: 90%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.note {
  background: #fff8a6;
  padding: 15px;
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  border-radius: 6px;
  transform: rotate(-2deg);
}
.note:nth-child(2){ transform: rotate(2deg); }
.note:nth-child(4){ transform: rotate(1deg); }

/* CENTER TEXT */
.center-text {
  text-align: center;
  font-size: 34px;
  color: #D02E77;
  margin: 40px 0;
}

/* CAROUSEL */
.carousel-container {
  overflow: hidden;
  margin: 20px 0;
}

.carousel-container.top {
  transform: rotate(-2deg);
}
.carousel-container.bottom {
  transform: rotate(2deg);
}

.carousel {
  display: flex;
  gap: 20px;
  width: max-content;
}

.scroll-right {
  animation: scrollRight 60s linear infinite;
}
.scroll-left {
  animation: scrollLeft 55s linear infinite;
}

@keyframes scrollRight {
  from { transform: translateX(-50%); }
  to { transform: translateX(0); }
}

@keyframes scrollLeft {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.polaroid {
  background: white;
  padding: 10px 10px 30px;
  width: 220px;
  flex-shrink: 0;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.polaroid img,
.polaroid video {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  to { transform: translateY(110vh); }
}

/* PETALS */
.petal {
  position: fixed;
  width: 10px;
  height: 6px;
  background: #e75480;
  border-radius: 50%;
  opacity: 0.7;
  pointer-events: none;
}
</style>
</head>

<body>

<audio id="music" src="blindspot.mp3" loop></audio>

<!-- QUESTIONS -->
<div id="q1" class="question-screen">
  <div class="box">
    <p>are you ready for ur gift?</p>
    <button onclick="goQ2()">yes</button>
    <button onclick="showNo()">no</button>
  </div>
</div>

<div id="q2" class="question-screen" style="display:none;">
  <div class="box">
    <p>are you sure?????</p>
    <button onclick="startMain()">yes</button>
    <button onclick="showNo()">no</button>
  </div>
</div>

<div id="noScreen" class="no-screen" style="display:none;">
  <p>well then fuck you</p>
</div>

<!-- ENVELOPE -->
<div class="envelope-screen" onclick="openSite()">
  <div class="envelope">
    <div class="envelope-flap"></div>
    <div class="heart">❤️</div>
  </div>
  <div class="tap-text">open for ur surprise</div>
</div>

<!-- INTRO -->
<div class="intro-screen" id="intro">
  <div class="intro-card">Happy 1 Year Bubzu ❤️</div>
</div>

<!-- CONTENT -->
<div class="content" id="content">

  <div class="board">
    <div class="note">I love you ❤️</div>
    <div class="note">1 year already 🫶</div>
    <div class="note">Still stuck with me 😌</div>
    <div class="note">My favourite human 💖</div>
    <div class="note">More memories to go ✨</div>
  </div>

  <div class="carousel-container top">
    <div class="carousel scroll-right" id="carouselTop"></div>
  </div>

  <div class="center-text">Happy 1 Year Bubzu ❤️</div>

  <div class="carousel-container bottom">
    <div class="carousel scroll-left" id="carouselBottom"></div>
  </div>

</div>

<script>

/* QUESTION FLOW */
function goQ2(){
  q1.style.display="none";
  q2.style.display="flex";
}

function startMain(){
  q2.style.display="none";
  document.querySelector(".envelope-screen").style.display="flex";
}

function showNo(){
  q1.style.display="none";
  q2.style.display="none";
  noScreen.style.display="flex";
}

/* MAIN FLOW */
function openSite(){
  document.querySelector('.envelope').classList.add('open');
  document.getElementById("music").play().catch(()=>{});

  launchConfetti();
  setTimeout(startPetals,1000);

  setTimeout(()=>{
    document.querySelector(".envelope-screen").style.display="none";

    intro.classList.add("show");

    setTimeout(()=>{
      intro.classList.remove("show");

      setTimeout(()=>{
        intro.style.display="none";
        content.style.display="block";
      },1000);

    },2500);

  },800);
}

/* MEDIA */
const topCarousel = document.getElementById("carouselTop");
const bottomCarousel = document.getElementById("carouselBottom");

let items=[];

for(let i=0;i<16;i++){
  items.push(`<div class="polaroid"><img src="photos/${i}.JPG"></div>`);
  if(i<9){
    items.push(`<div class="polaroid"><video src="videos/${i}.MP4" autoplay muted loop playsinline></video></div>`);
  }
}

let contentHTML = items.join("") + items.join("");
topCarousel.innerHTML = contentHTML;
bottomCarousel.innerHTML = contentHTML;

/* CONFETTI */
function launchConfetti(){
  const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2"];
  for(let i=0;i<80;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* PETALS */
function createPetal(){
  let p=document.createElement("div");
  p.className="petal";

  let startX=Math.random()*window.innerWidth;
  let drift=(Math.random()-0.5)*150;
  let duration=Math.random()*4+6;

  p.style.left=startX+"px";
  p.style.top="-10px";

  document.body.appendChild(p);

  let start=null;

  function animate(t){
    if(!start) start=t;
    let progress=(t-start)/(duration*1000);

    let y=progress*window.innerHeight;
    let x=startX+drift*Math.sin(progress*Math.PI);

    p.style.transform=`translate(${x}px,${y}px) rotate(${progress*360}deg)`;

    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      p.remove();
    }
  }

  requestAnimationFrame(animate);
}

function startPetals(){
  setInterval(createPetal,300);
}

</script>

</body>
</html>
