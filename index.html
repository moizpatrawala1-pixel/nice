<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ENVELOPE */
.envelope-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: #111;
  cursor: pointer;
  transition: opacity 0.8s ease;
}

.envelope {
  width: 160px;
  height: 110px;
  background: #ff4d6d;
  position: relative;
  border-radius: 12px;
}

.envelope::before {
  content: "";
  position: absolute;
  border-left: 80px solid transparent;
  border-right: 80px solid transparent;
  border-bottom: 55px solid #ff758f;
  top: 0;
}

.envelope-text {
  margin-top: 20px;
  opacity: 0.8;
}

/* CONTENT */
.content {
  display: none;
  padding: 20px;
  opacity: 0;
  transition: opacity 1s ease;
}

.content.show {
  opacity: 1;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 28px;
  margin-bottom: 20px;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* CAROUSEL */
.carousel-container {
  position: relative;
  overflow: hidden;
}

.carousel {
  display: flex;
  gap: 25px;
}

.polaroid {
  background: white;
  padding: 10px 10px 30px;
  width: 220px;
  flex-shrink: 0;
  border-radius: 10px;
  transition: transform 0.4s, filter 0.4s;
  filter: blur(1px) brightness(0.8);
}

.polaroid.active {
  transform: scale(1.1);
  filter: blur(0) brightness(1);
  z-index: 2;
}

.polaroid img,
.polaroid video {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

/* NAV */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 22px;
  padding: 10px;
  cursor: pointer;
  z-index: 10;
}

.left { left: 10px; }
.right { right: 10px; }

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}

/* PETALS */
.petal {
  position: fixed;
  width: 10px;
  height: 6px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(-10px); }
  to { transform: translateY(110vh) translateX(50px); }
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div class="envelope-screen" id="envelope" onclick="openSite()">
  <div class="envelope"></div>
  <div class="envelope-text">open for ur surprise</div>
</div>

<div class="content" id="content">
  <div class="title">Happy 1 Year Bubzu ❤️</div>

  <div class="carousel-container">
    <button class="nav left" onclick="scrollManual(1)">⬅️</button>
    <div class="carousel" id="carousel"></div>
    <button class="nav right" onclick="scrollManual(-1)">➡️</button>
  </div>
</div>

<script>

function openSite(){
  const env = document.getElementById("envelope");
  env.style.opacity = 0;

  setTimeout(()=>{
    env.style.display="none";
    const content = document.getElementById("content");
    content.style.display="block";
    setTimeout(()=>content.classList.add("show"),50);
  },800);

  document.getElementById("music").play().catch(()=>{});
  launchConfetti();
}

/* MEDIA */
const carousel = document.getElementById("carousel");
let items = [];

for(let i=0;i<16;i++){
  items.push(`<div class="polaroid"><img src="photos/${i}.JPG"></div>`);
  if(i<9){
    items.push(`<div class="polaroid"><video src="videos/${i}.MP4" autoplay muted loop playsinline></video></div>`);
  }
}

carousel.innerHTML = items.join("") + items.join("");

/* AUTO SCROLL */
let scrollX=0;
let speed=0.7;
let paused=false;

function animate(){
  if(!paused){
    scrollX -= speed;
    carousel.style.transform = `translateX(${scrollX}px)`;

    if(Math.abs(scrollX) > carousel.scrollWidth/2){
      scrollX = 0;
    }
  }
  highlightCenter();
  requestAnimationFrame(animate);
}
animate();

/* DEPTH */
function highlightCenter(){
  const items = document.querySelectorAll(".polaroid");
  items.forEach(el => el.classList.remove("active"));

  let center = window.innerWidth / 2;

  items.forEach(el=>{
    const rect = el.getBoundingClientRect();
    const mid = rect.left + rect.width/2;

    if(Math.abs(center - mid) < 120){
      el.classList.add("active");
    }
  });
}

/* BUTTON */
function scrollManual(dir){
  scrollX += dir * 250;
}

carousel.addEventListener("mouseenter",()=>paused=true);
carousel.addEventListener("mouseleave",()=>paused=false);

/* CONFETTI */
function launchConfetti(){
  const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2","#f72585"];
  for(let i=0;i<100;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(Math.random()*2+3)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

/* PETALS */
function createPetal(){
  let p=document.createElement("div");
  p.className="petal";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(Math.random()*5+5)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),10000);
}

setInterval(createPetal,300);

</script>

</body>
</html>
